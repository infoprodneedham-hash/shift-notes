<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shift Notes Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #e0e7ff 100%);
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #06b6d4;
            --secondary-hover: #0891b2;
            --accent: #10b981;
            --accent-hover: #059669;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.9);
            --border-radius: 20px;
            --input-radius: 12px;
            --font-main: 'Quicksand', sans-serif;
            --font-heading: 'Fredoka', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Utility Components */
        .bubble-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.1);
            border: 4px solid #ffffff;
            padding: 30px;
            width: 100%;
            max-width: 850px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        h1, h2, h3 {
            font-family: var(--font-heading);
            color: var(--primary);
            margin-bottom: 15px;
            text-align: center;
        }

        label {
            font-weight: 700;
            color: var(--text-dark);
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        input[type="text"], input[type="password"], input[type="time"], input[type="date"], select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #cbd5e1;
            border-radius: var(--input-radius);
            font-family: var(--font-main);
            font-size: 1rem;
            color: var(--text-dark);
            background-color: #fff;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.15);
        }

        button {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            padding: 12px 24px;
            border: none;
            border-radius: var(--input-radius);
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-secondary:hover { background: var(--secondary-hover); }
        .btn-accent { background: var(--accent); color: white; }
        .btn-accent:hover { background: var(--accent-hover); }

        /* Gate / Access Screen */
        #gateScreen {
            max-width: 450px;
            text-align: center;
        }
        #gateScreen h1 { font-size: 2.5rem; color: var(--primary); }
        #gateScreen p { color: var(--text-muted); margin-bottom: 20px; }
        .gate-input-group { margin-bottom: 20px; }
        #errorMessage { color: #ef4444; font-weight: 700; margin-top: 10px; min-height: 20px; }

        /* Main Content Screen */
        #mainScreen {
            display: none;
        }

        /* Header Form Controls */
        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            background: rgba(224, 242, 254, 0.4);
            padding: 20px;
            border-radius: var(--input-radius);
        }

        /* Calendar Week UI Layout */
        .week-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .day-card {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: var(--input-radius);
            padding: 20px;
            display: grid;
            grid-template-columns: 160px 1fr;
            gap: 20px;
            align-items: start;
        }

        .day-label-zone {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
        }

        .day-name {
            font-family: var(--font-heading);
            font-size: 1.3rem;
            color: var(--primary);
        }

        .day-date {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 700;
        }

        .day-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        .char-counter {
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Bottom Controls / Actions Bar */
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-between;
            align-items: center;
            border-top: 3px dashed #e2e8f0;
            padding-top: 25px;
        }

        .action-group-left {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .action-group-right {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .slot-selector-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .slot-selector-wrapper select {
            width: auto;
            min-width: 140px;
        }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .bubble-card { padding: 15px; }
            .day-card {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .day-label-zone {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                border-bottom: 2px solid #f1f5f9;
                padding-bottom: 8px;
            }
            .action-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .action-group-left, .action-group-right, .slot-selector-wrapper {
                flex-direction: column;
                align-items: stretch;
                width: 100%;
            }
            .slot-selector-wrapper select { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="gateScreen" class="bubble-card">
        <h1>Welcome! ✨</h1>
        <p>Please enter your passcode to view your shift logs.</p>
        <div class="gate-input-group">
            <input type="password" id="passcodeInput" placeholder="CLIENT CODE HERE" autocomplete="off">
            <div id="errorMessage"></div>
        </div>
        <button class="btn-primary" onclick="verifyPasscode()" style="width: 100%;">Unlock Dashboard 🔓</button>
    </div>

    <main id="mainScreen" class="bubble-card">
        <header>
            <h1 id="appTitle">Shift Notes Manager 📝</h1>
            <p style="text-align:center; color: var(--text-muted); margin-bottom: 25px; font-weight:500;">
                Track, save, and export your weekly progress seamlessly.
            </p>
        </header>

        <form id="formspreePayloadForm" action="https://formspree.io/f/placeholder" method="POST" style="display:none;"></form>

        <div class="meta-grid">
            <div>
                <label for="clientName">Client Name</label>
                <input type="text" id="clientName" placeholder="Enter Client Name..." value="Acme Corp">
            </div>
            <div>
                <label for="weekStarterDate">Week Commencing (Mon)</label>
                <input type="date" id="weekStarterDate" onchange="calculateWeekDates()">
            </div>
            <div>
                <label for="allocatedUsers">Assigned Users (Max 3)</label>
                <input type="text" id="allocatedUsers" placeholder="e.g. Alice, Bob, Charlie" maxlength="100">
            </div>
        </div>

        <div class="week-container" id="weekContainer">
            </div>

        <div class="action-bar">
            <div class="action-group-left">
                <div class="slot-selector-wrapper">
                    <label for="saveSlotSelect" style="margin-bottom:0; white-space:nowrap;">Active Slot:</label>
                    <select id="saveSlotSelect" onchange="loadFromSelectedSlot()">
                        </select>
                </div>
                <button class="btn-secondary" onclick="exportToCSV()">Download CSV 📥</button>
            </div>
            
            <div class="action-group-right">
                <button class="btn-accent" onclick="handleSaveAndSubmitChain()">Save & Submit Week 🚀</button>
            </div>
        </div>
    </main>

    <script>
        const SECURE_CODE = "CSM-29";
        const DAYS_OF_WEEK = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        
        // Formspree Target Endpoint (Replace with your actual Formspree endpoint token ID if needed)
        // Leaving standard system fallbacks so it securely runs standard form submissions instantly
        let formspreeEndpoint = "https://formspree.io/f/mqakozze"; 

        // Local Document States Initialization
        document.addEventListener("DOMContentLoaded", () => {
            initSlotOptions();
            setDefaultMonday();
            generateDayCards();
            
            // Auto-focus passcode field
            document.getElementById('passcodeInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') verifyPasscode();
            });
        });

        // 1. Passcode Check Access Execution Flow
        function verifyPasscode() {
            const inputVal = document.getElementById('passcodeInput').value.trim();
            const errDiv = document.getElementById('errorMessage');
            
            if (inputVal === SECURE_CODE) {
                document.getElementById('gateScreen').style.display = 'none';
                document.getElementById('mainScreen').style.display = 'block';
                // Try reading initial data configuration from standard primary slot 1
                loadFromSelectedSlot();
            } else {
                errDiv.textContent = "❌ Invalid passcode. Please try again.";
                document.getElementById('passcodeInput').value = "";
            }
        }

        // 2. Setup standard dropdown slots options (1-52 Weeks allocation)
        function initSlotOptions() {
            const selector = document.getElementById('saveSlotSelect');
            selector.innerHTML = '';
            for (let i = 1; i <= 52; i++) {
                let opt = document.createElement('option');
                opt.value = `week_slot_${i}`;
                opt.textContent = `Week Slot ${i}`;
                selector.appendChild(opt);
            }
        }

        // 3. Set structural Monday initialization reference anchor points
        function setDefaultMonday() {
            const now = new Date();
            const currentDay = now.getDay(); // 0 is Sunday, 1 is Monday...
            const distanceToMonday = currentDay === 0 ? -6 : 1 - currentDay;
            const targetMonday = new Date(now.setDate(now.getDate() + distanceToMonday));
            
            // Format to standard ISO string short notation format YYYY-MM-DD
            const formattedDate = targetMonday.toISOString().split('T')[0];
            document.getElementById('weekStarterDate').value = formattedDate;
        }

        // 4. Generate Responsive Structural Rows Mapping UI
        function generateDayCards() {
            const container = document.getElementById('weekContainer');
            container.innerHTML = '';

            DAYS_OF_WEEK.forEach((day, index) => {
                const dayCard = document.createElement('div');
                dayCard.className = 'day-card';
                dayCard.dataset.dayIndex = index;

                dayCard.innerHTML = `
                    <div class="day-label-zone">
                        <span class="day-name">${day}</span>
                        <span class="day-date" id="dateLabel_${index}">-</span>
                    </div>
                    <div class="day-inputs">
                        <div>
                            <label>Shift Timing</label>
                            <div style="display: flex; gap: 8px; align-items: center;">
                                <input type="time" id="timeStart_${index}" title="Start Time">
                                <span style="font-weight:700; color:var(--text-muted)">to</span>
                                <input type="time" id="timeEnd_${index}" title="End Time">
                            </div>
                        </div>
                        <div>
                            <label>Shift Notes</label>
                            <textarea id="notes_${index}" maxlength="250" placeholder="Enter notes here..." rows="2" oninput="updateCharCount(${index})"></textarea>
                            <div class="char-counter"><span id="charCount_${index}">0</span>/250 chars</div>
                        </div>
                    </div>
                `;
                container.appendChild(dayCard);
            });
            calculateWeekDates();
        }

        // 5. Compute Sequential Calendars Matching Selected Monday Anchor
        function calculateWeekDates() {
            const baseDateVal = document.getElementById('weekStarterDate').value;
            if (!baseDateVal) return;

            const baseDate = new Date(baseDateVal);
            
            DAYS_OF_WEEK.forEach((_, index) => {
                const currentDayDate = new Date(baseDate);
                currentDayDate.setDate(baseDate.getDate() + index);
                
                const label = document.getElementById(`dateLabel_${index}`);
                if (label) {
                    label.textContent = currentDayDate.toLocaleDateString('en-US', { 
                        month: 'short', 
                        day: 'numeric', 
                        year: 'numeric' 
                    });
                }
            });
        }

        function updateCharCount(index) {
            const textarea = document.getElementById(`notes_${index}`);
            const counter = document.getElementById(`charCount_${index}`);
            counter.textContent = textarea.value.length;
        }

        // 6. Local Storage Data Schema Management Mapping Framework
        function packageFormData() {
            const data = {
                clientName: document.getElementById('clientName').value,
                weekCommencing: document.getElementById('weekStarterDate').value,
                allocatedUsers: document.getElementById('allocatedUsers').value,
                shifts: []
            };

            DAYS_OF_WEEK.forEach((day, index) => {
                data.shifts.push({
                    dayName: day,
                    dateText: document.getElementById(`dateLabel_${index}`).textContent,
                    startTime: document.getElementById(`timeStart_${index}`).value,
                    endTime: document.getElementById(`timeEnd_${index}`).value,
                    notes: document.getElementById(`notes_${index}`).value
                });
            });

            return data;
        }

        function unpackFormData(data) {
            if (!data) return;
            if (data.clientName !== undefined) document.getElementById('clientName').value = data.clientName;
            if (data.weekCommencing !== undefined) document.getElementById('weekStarterDate').value = data.weekCommencing;
            if (data.allocatedUsers !== undefined) document.getElementById('allocatedUsers').value = data.allocatedUsers;
            
            calculateWeekDates();

            if (data.shifts && Array.isArray(data.shifts)) {
                data.shifts.forEach((shift, index) => {
                    if(index >= DAYS_OF_WEEK.length) return;
                    if(shift.startTime !== undefined) document.getElementById(`timeStart_${index}`).value = shift.startTime;
                    if(shift.endTime !== undefined) document.getElementById(`timeEnd_${index}`).value = shift.endTime;
                    if(shift.notes !== undefined) {
                        document.getElementById(`notes_${index}`).value = shift.notes;
                        updateCharCount(index);
                    }
                });
            }
        }

        function saveToSlot(slotId) {
            const data = packageFormData();
            localStorage.setItem(slotId, JSON.stringify(data));
        }

        function loadFromSelectedSlot() {
            const activeSlot = document.getElementById('saveSlotSelect').value;
            const storedData = localStorage.getItem(activeSlot);
            if (storedData) {
                unpackFormData(JSON.parse(storedData));
            } else {
                // Clear active shifts fields if slot is completely brand new
                DAYS_OF_WEEK.forEach((_, index) => {
                    document.getElementById(`timeStart_${index}`).value = '';
                    document.getElementById(`timeEnd_${index}`).value = '';
                    document.getElementById(`notes_${index}`).value = '';
                    updateCharCount(index);
                });
            }
        }

        // Find next incremental empty slot key or fallback sequentially
        function getNextAvailableSlotNumber(currentSlotKey) {
            let currentNum = parseInt(currentSlotKey.replace('week_slot_', ''));
            let nextNum = currentNum + 1;
            if (nextNum > 52) nextNum = 1; // Cycle loop fallback security boundaries
            return nextNum;
        }

        // 7. Data Compilation & Export Functionality (CSV Transformation Engine)
        function exportToCSV() {
            const data = packageFormData();
            let csvRows = [];
            
            // Document Headers Metadata Metrics Row Configuration
            csvRows.push(`"Client Name","${data.clientName.replace(/"/g, '""')}"`);
            csvRows.push(`"Week Commencing","${data.weekCommencing}"`);
            csvRows.push(`"Allocated Users","${data.allocatedUsers.replace(/"/g, '""')}"`);
            csvRows.push(""); // Spacing Row
            
            // Content Structural Headings Matrix Data Map Columns
            csvRows.push(`"Day","Date","Start Time","End Time","Shift Notes"`);
            
            data.shifts.forEach(shift => {
                csvRows.push(`"${shift.dayName}","${shift.dateText}","${shift.startTime}","${shift.endTime}","${shift.notes.replace(/"/g, '""')}"`);
            });

            const csvContent = "data:text/csv;charset=utf-8," + csvRows.join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Shift_Notes_${data.clientName.replace(/\s+/g, '_')}_${data.weekCommencing}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 8. Integrated Workflow Chain Event Handlers
        function handleSaveAndSubmitChain() {
            const activeSlotSelector = document.getElementById('saveSlotSelect');
            const currentSlotKey = activeSlotSelector.value;
            
            // Step A: Save execution directly to local space slot config array
            saveToSlot(currentSlotKey);
            
            // Step B: Submit packaged telemetry array downstream safely directly via hidden form elements payload maps to Formspree
            const datasetPayload = packageFormData();
            
            // Constructing programmatic DOM submission system payload container components dynamically
            const formspreeForm = document.getElementById('formspreePayloadForm');
            formspreeForm.action = formspreeEndpoint;
            formspreeForm.innerHTML = ''; // Fresh clean field mappings initialization

            // Populate flattened data mappings for easy to read Formspree notification emails
            const addHiddenField = (name, val) => {
                let input = document.createElement('input');
                input.type = 'hidden';
                input.name = name;
                input.value = val;
                formspreeForm.appendChild(input);
            };

            addHiddenField('Client Name', datasetPayload.clientName);
            addHiddenField('Week Commencing Mon Date', datasetPayload.weekCommencing);
            addHiddenField('Allocated Reporting Users', datasetPayload.allocatedUsers);
            addHiddenField('Target System Archive Slot Saved', currentSlotKey);

            datasetPayload.shifts.forEach((shift) => {
                addHiddenField(`${shift.dayName}_(${shift.dateText})_Timing`, `${shift.startTime} to ${shift.endTime}`);
                addHiddenField(`${shift.dayName}_(${shift.dateText})_Notes`, shift.notes);
            });

            // Step C: Determine next automation slot sequence before hard page refreshes execution triggers
            const nextSlotIndex = getNextAvailableSlotNumber(currentSlotKey);
            activeSlotSelector.value = `week_slot_${nextSlotIndex}`;
            
            // Step D: Inform user, submit to formspree, and wipe state/refresh application layout viewport back to entry gate
            alert(`🎉 Success!\n\n1. Current shifts saved locally to [${currentSlotKey.replace('_',' ')}].\n2. Next active view automated to [Week Slot ${nextSlotIndex}].\n3. Formspree payload compiled.\n\nClick OK to finalize submission and reset.`);
            
            // Submit form layout programmatically as target submission pipeline safely
            formspreeForm.submit();

            // Fallback fallback reload simulation strategy in sync mode scenario
            setTimeout(() => {
                window.location.reload();
            }, 350);
        }
    </script>
</body>
</html>
